name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bruker v4 som er påkrevd i 2026
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          python3 -m pip install --user --upgrade Cython==0.29.33 virtualenv

      - name: Build with Buildozer
        # Vi bruker den offisielle buildozer-action eller en stabil v1
        uses: ArtemShatriton/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: Upload APK
        # VIKTIG: Oppgradert til v4 for å unngå 'Deprecation' feilen
        uses: actions/upload-artifact@v4
        with:
          name: PedagogiskArkiv-App
          path: bin/*.apk
