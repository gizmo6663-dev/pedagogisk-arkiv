name: Build APK with Docker

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Tving clean build (slett .buildozer-cache)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp cache for .buildozer
        uses: actions/cache@v4
        id: buildozer-cache
        with:
          path: ~/.buildozer
          # Cache-nøkkelen inkluderer build-tools-versjonen (via buildozer.spec-hash) slik at
          # endringer i android.sdk_buildtools alltid gir et cache-miss og ren SDK-installasjon.
          key: ${{ runner.os }}-buildozer-docker-${{ hashFiles('buildozer.spec') }}-${{ github.event.inputs.clean_build == 'true' && 'clean' || 'normal' }}
          restore-keys: |
            ${{ runner.os }}-buildozer-docker-

      - name: Bygg APK med Docker
        run: |
          # Slett .buildozer hvis clean_build er true
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Sletter .buildozer-mappe for clean build"
            rm -rf ~/.buildozer
          fi

          # Finn konfigurert build-tools-versjon fra buildozer.spec
          BUILDTOOLS_VERSION=$(grep -E '^android\.sdk_buildtools\s*=' buildozer.spec | cut -d= -f2 | tr -d ' ')
          echo "Konfigurert build-tools-versjon: ${BUILDTOOLS_VERSION}"

          # Slett ufullstendig SDK-cache hvis den konfigurerte build-tools-versjonen mangler.
          # Dette fanger opp tilfeller der build-tools-mappen eksisterer men mangler riktig
          # versjon (f.eks. etter en gjenbrukt cache med feil versjon), i tillegg til at
          # hele build-tools-mappen mangler.
          if [ -d "$HOME/.buildozer/android/platform/android-sdk" ] && \
             [ ! -d "$HOME/.buildozer/android/platform/android-sdk/build-tools/${BUILDTOOLS_VERSION}" ]; then
            echo "⚠️ build-tools/${BUILDTOOLS_VERSION} mangler i cachet SDK – sletter .buildozer for å tvinge reinstallering"
            rm -rf ~/.buildozer
          fi

          docker run --rm \
            -v "$PWD":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: pedagogisk-arkiv-apk
          path: bin/*.apk
          retention-days: 30