name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Vi legger til libltdl-dev og binutils som er kritiske for libtool-makroer
          sudo apt install -y git coreutils patch zip unzip autoconf automake libtool libltdl-dev \
          m4 pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev libsqlite3-dev \
          lld openjdk-17-jdk python3-dev build-essential binutils
          
          python3 -m pip install --upgrade pip
          python3 -m pip install --user --upgrade Cython==0.29.33 virtualenv setuptools wheel
          python3 -m pip install --user https://github.com/kivy/buildozer/archive/master.zip

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # Vi bruker 'stdbuf' for å sikre at loggen strømmes riktig og unngå 'Broken pipe'
          # Vi legger også til en fiks for aclocal hvis systemet fortsatt ikke finner makroene
          yes | stdbuf -oL buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/runner/.local/bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PedagogiskArkiv-App
          path: bin/*.apk
