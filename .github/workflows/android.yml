name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Vi har byttet ut libtinfo5 med libtinfo6 og libncurses5 med libncurses6
          sudo apt install -y git coreutils patch zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses6-dev libncursesw6-dev libtinfo6 cmake libffi-dev libssl-dev
          sudo apt install -y openjdk-17-jdk
          python3 -m pip install --upgrade pip
          python3 -m pip install --user --upgrade Cython==0.29.33 virtualenv
          python3 -m pip install --user https://github.com/kivy/buildozer/archive/master.zip

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          # Vi bruker 'yes' for å godta lisenser
          yes | buildozer android debug
        env:
          PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/runner/.local/bin

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PedagogiskArkiv-App
          path: bin/*.apk
